;PlatformIO Project Configuration File
;
;   Build options: build flags, source filters
;   Upload options: custom upload port, speed, extra flags
;   Library options: dependencies, extra library storage
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ./src/
; Default to Seeed Studio XIAO ESP32S3 (current primary board)
default_envs = seeed_xiao_esp32s3
description = StatusGlow - NeoPixel Presence device for ESP32

[env]
platform=espressif32
board=esp32dev
framework=arduino
extra_scripts = pre:scripts/embed_assets.py
; upload_port = COM4
monitor_speed=115200
upload_speed=921600
build_flags=
    -DDATAPIN=13
    -DNUMLEDS=16
    ; -DCORE_DEBUG_LEVEL=5
lib_deps=
    ArduinoJson
    Adafruit NeoPixel


[env:seeed_xiao_esp32c3]
; Seeed Studio XIAO ESP32C3 (RISC-V, single-core)
board = seeed_xiao_esp32c3
upload_speed = 921600
monitor_speed = 115200
build_flags =
    -DNUMLEDS=16
    -DDATAPIN=D8
; D8 (GPIO8) is a safe pin for XIAO ESP32C3. Button on D7 (GPIO7). RGB (not RGBW) LEDs.

lib_deps =
    ${env.lib_deps}

[env:seeed_xiao_esp32s3]
; Seeed Studio XIAO ESP32S3 (dual-core, recommended)
board = seeed_xiao_esp32s3
upload_speed = 921600
monitor_speed = 115200
board_build.psram = enabled
build_flags =
    -DNUMLEDS=16
    -DDATAPIN=D10
    -DCONFIG_NEOPIXEL_RMT_DEFAULT=1
    -DCONFIG_FREERTOS_HZ=1000
; LED-only default: external strip on D10, button on D7, onboard status LED on GPIO21.

lib_deps =
    ${env.lib_deps}

[env:waveshare_esp32s3_zero]
; Waveshare ESP32-S3-Zero (dual-core, 2MB PSRAM, onboard RGB LED on GPIO21)
; 4MB Flash, 2MB OPI PSRAM
board = Waveshare_esp32-s3_zero
upload_speed = 460800
monitor_speed = 115200
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_flags =
    -DNUMLEDS=16
    -DDATAPIN=8
; GPIO8 for LED strip, GPIO7 for button, GPIO21 has onboard WS2812 status LED
; 4MB flash (ESP32-S3FN4R2), 2MB OPI PSRAM enabled
